apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusops-frontend-dev-deployment
  namespace: nexusops-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexusops-frontend
  template:
    metadata:
      labels:
        app: nexusops-frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
    spec:
      shareProcessNamespace: true
      containers:
      - name: web-app
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      - name: nginx-exporter
        image: nginx/nginx-prometheus-exporter:latest
        args:
          - -nginx.scrape-uri
          - http://127.0.0.1/stub_status
          - -telemetry.address
          - :9113
        ports:
        - name: metrics
          containerPort: 9113
      volumes:
      - name: nginx-config
        configMap:
          name: nexusops-frontend-config