{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexusops-frontend-ingress
  namespace: nexusops-dev
  annotations:
    # SSL yönlendirmesini kapatıyoruz, lokal testte başımızı ağrıtmasın
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexusops-frontend-dev-service
            port:
              number: {{ .Values.service.port | default 80 }}
{{- end }}