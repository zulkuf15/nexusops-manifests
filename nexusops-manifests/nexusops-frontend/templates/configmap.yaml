apiVersion: v1
kind: ConfigMap
metadata:
  name: nexusops-frontend-config
  namespace: nexusops-dev
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
        }
        location /stub_status {
            stub_status;
            allow 127.0.0.1;
            deny all;
        }
    }